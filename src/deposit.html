<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
    <title>Depositar</title>
</head>
<body>
  <div class="container mt-5" style="max-width: 450px;">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2>Depositar Dinero</h2>
      <!-- Botón simple para regresar al menú principal -->
      <a href="menu.html" class="btn btn-outline-secondary btn-sm">Volver</a>
    </div>

    <div class="card mb-4 bg-light p-3">
      <h5>Saldo antes de operar: <strong id="saldoActual">$0</strong></h5>
    </div>

    <!-- Formulario para ingresar el dinero a depositar -->
    <form id="depositForm">
      <div class="form-group">
        <label for="montoDeposito">Monto a depositar:</label>
        <!-- type="number" restringe la entrada a números y min="1" impide ingresar negativos desde las flechas del teclado -->
        <input type="number" id="montoDeposito" class="form-control" placeholder="Ingrese el monto" min="1">
      </div>
      <button type="submit" class="btn btn-primary btn-block">Confirmar Depósito</button>
    </form>
    <!-- Contenedor para mostrar las alertas de éxito o error -->
    <div id="alert-container" class="mt-3"></div>
  </div>

  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script>
    $(document).ready(function() {

      // Rescata el saldo actual del navegador. Si no existe, usa 10000 por defecto
        let saldo = parseInt(localStorage.getItem('saldoUsuario')) || 10000;
        // Muestra el saldo en pesos chilenos
        $('#saldoActual').text('$' + saldo.toLocaleString('es-CL'));

        $('#depositForm').submit(function(event) {
            // Detiene el refresco automático de la página
            event.preventDefault();
            
            // Limpia los textos de las alertas y leyendas anteriores
            $('#alert-container').empty();
            $('#leyendaContenedor').empty();

            // Captura el valor del input y lo transforma en un número entero
            let montoInput = $('#montoDeposito').val();
            let monto = parseInt(montoInput);

            // Validación de seguridad: Verifica que no esté vacío, que sea un número y que sea mayor a 0
            if (!montoInput || isNaN(monto) || monto <= 0) {
                // Inyecta una alerta roja en caso de error y detiene la función con el 'return'
                $('#alert-container').html(
                    '<div class="alert alert-danger text-center shadow-sm">' +
                        '<strong>Error:</strong> Ingrese un monto válido.' +
                    '</div>'
                );
                return;
            }

            // Suma el depósito al saldo que ya teníamos ahorrado
            let nuevoSaldo = saldo + monto;
            // Guarda el nuevo total en el navegador para que el Menú vea el cambio
            localStorage.setItem('saldoUsuario', nuevoSaldo);

            // Muestra un pequeño texto informativo con la cantidad exacta que se acaba de ingresar
            $('#leyendaContenedor').html(
                '<p class="mb-0">Monto depositado recientemente: $' + monto.toLocaleString('es-CL') + '</p>'
            );

            // Inyecta el cuadro verde de operación exitosa
            $('#alert-container').html(
                '<div class="alert alert-success text-center shadow-sm">' +
                    '<strong>¡Depósito Exitoso!</strong> El saldo ha sido actualizado correctamente.' +
                '</div>'
            );
            // Espera 2 segundos mostrando el éxito y luego devuelve al usuario al menú principal
            setTimeout(function() {
                window.location.href = 'menu.html';
            }, 2000);
        });

    });
  </script>
</body>
</html>
