<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
  
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
    
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
</head>
<body>
  <div class="container mt-5" style="max-width: 500px;">
      <div class="bg-light border rounded shadow p-4">
          <h1 class="text-center mb-4">Iniciar Sesión</h1>
          
          <!-- Formulario de login. Le asignamos un ID para poder controlarlo después con JavaScript -->
          <form id="loginForm">
            <div class="form-group">
              <label for="email" class="font-weight-bold">Email:</label>
              <!-- "required" obliga al usuario a escribir algo antes de enviar el formulario -->
              <input type="text" id="email" class="form-control" placeholder="Enter email" required>
            </div>
            
            <div class="form-group">
              <label for="password" class="font-weight-bold">Password:</label>
              <input type="password" id="password" class="form-control" placeholder="Enter password" required>
            </div>
           
            <button type="submit" class="btn btn-primary btn-block">Login</button>
          </form>

          <!-- Este div vacío servirá para mostrar los mensajes de éxito o error dinámicamente usando JavaScript -->
          <div id="alertContainer" class="mt-3"></div>
      </div>
  </div>

  <script>
    // Esta función asegura que el código JavaScript se ejecute SOLO cuando toda la página HTML se haya cargado por completo
    $(document).ready(function () {

        $("#loginForm").on("submit", function (event) {
            // Evita que la página se recargue automáticamente
            event.preventDefault();
            // Limpia cualquier mensaje de alerta anterior para que no se acumulen en la pantalla
            $("#alertContainer").empty();

            // Captura los valores que el usuario escribió, y ".trim()" borra espacios en blanco accidentales al inicio o final
            let email = $("#email").val().trim();
            let email = $("#email").val().trim();
            let password = $("#password").val().trim();
            
            // Validación: Compara si los datos coinciden exactamente con el usuario de prueba
            if (email === "admin@admin.cl" && password === "123") {
                
                // Si los datos son correctos, revisa si ya existe un saldo guardado en el navegador. 
                // Si NO existe (!), lo crea con un monto inicial de 500000. Esto simula una base de datos.
                if (!localStorage.getItem('saldoUsuario')) {
                    localStorage.setItem('saldoUsuario', '500000'); 
                }

                // Inyecta un recuadro verde (alert-success) de Bootstrap en el div vacío que dejamos arriba
                $("#alertContainer").html(
                    '<div class="alert alert-success text-center shadow-sm">' +
                        '<strong>¡Éxito!</strong> Datos correctos. Redirigiendo...' +
                    '</div>'
                );

                // Espera antes de ejecutar el código de adentro
                setTimeout(function() {
                    // Redirige automáticamente al usuario a la pantalla del menú principal
                    window.location.href = '../HTML/menu.html';
                }, 2000);

            } else {
       
                // Si el email o la contraseña no coinciden, inyecta un recuadro rojo (alert-danger) indicando el error
                $("#alertContainer").html(
                    '<div class="alert alert-danger text-center shadow-sm">' +
                        '<strong>Error:</strong> Credenciales incorrectas.' +
                    '</div>'
                );
            }
        }); 
    }); 
  </script>
</body>
</html>
